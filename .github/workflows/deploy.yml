name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e1ac21482b2f9684fcca4800ae153098
          projectName: jordanview-cleaning
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
