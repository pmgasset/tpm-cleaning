name = "jordanview-cleaning"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "jordanview-cleaning"
database_id = "e395268e-9896-4519-b88f-b0213a703c15"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "jordanview-cleaning-photos"

# ── Non-secret vars (safe to commit) ──────────────────────────────────────────
[vars]
WP_API_URL    = "https://240jordanview.com/wp-json/cleanerportal/v1"
PORTAL_URL    = "https://cleaning.240jordanview.com"
PAYPAL_MODE   = "sandbox"
CLEANER_NAME  = "Maria"

# ── Secrets (never commit) ────────────────────────────────────────────────────
# Fill in .dev.vars (gitignored) then run once:
#   npx wrangler pages secret bulk .dev.vars --project-name jordanview-cleaning
#
#   WP_API_KEY             random string — must match JV_CLEANER_API_KEY in wp-config.php
#   VOIPMS_USER            voip.ms account email        (= gms_voipms_user WP option)
#   VOIPMS_PASS            voip.ms API password         (= gms_voipms_pass WP option)
#   VOIPMS_DID             sending DID, digits only     (= gms_voipms_did WP option)
#   OWNER_PHONE            your mobile, digits only     e.g. 7801234567
#   SHORTLINK_TOKEN        Bearer token for 240jv.link  (= gms_shortener_api_token WP option)
#   PAYPAL_CLIENT_ID       from developer.paypal.com → My Apps
#   PAYPAL_CLIENT_SECRET   from developer.paypal.com → My Apps
#   CLEANER_PAYPAL_EMAIL   cleaner's PayPal email address
#   OWNER_EMAIL            your email (gates /owner to you only)
